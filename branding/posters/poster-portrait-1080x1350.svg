<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <!-- AKASHA · IG FEED POSTER · 1080×1350 · Kalki cinematic aesthetic -->

  <defs>
    <!-- background gradient: deep indigo void to amber-temple horizon -->
    <radialGradient id="bg" cx="50%" cy="62%" r="80%">
      <stop offset="0%"   stop-color="#1c1133"/>
      <stop offset="40%"  stop-color="#0e0820"/>
      <stop offset="100%" stop-color="#05030a"/>
    </radialGradient>

    <!-- amber glow for the glyph -->
    <radialGradient id="emberGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#d97757" stop-opacity="0.85"/>
      <stop offset="40%"  stop-color="#d97757" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#d97757" stop-opacity="0"/>
    </radialGradient>

    <!-- soft glow filter -->
    <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="bigBloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="32" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 1. Cosmic background -->
  <rect width="1080" height="1350" fill="url(#bg)"/>

  <!-- 2. Stars -->
  <g fill="#faf9f5" opacity="0.55">
    <circle cx="120" cy="240" r="1.2"/>
    <circle cx="280" cy="180" r="0.9"/>
    <circle cx="450" cy="120" r="1.6"/>
    <circle cx="640" cy="200" r="1.1"/>
    <circle cx="820" cy="160" r="0.8"/>
    <circle cx="950" cy="290" r="1.4"/>
    <circle cx="160" cy="420" r="0.9"/>
    <circle cx="380" cy="490" r="0.7"/>
    <circle cx="700" cy="430" r="1.2"/>
    <circle cx="900" cy="510" r="0.8"/>
    <circle cx="100" cy="900" r="1.0"/>
    <circle cx="220" cy="1080" r="0.9"/>
    <circle cx="500" cy="1140" r="1.4"/>
    <circle cx="780" cy="1020" r="1.1"/>
    <circle cx="970" cy="1180" r="0.7"/>
    <circle cx="60"  cy="640" r="1.0"/>
    <circle cx="340" cy="800" r="0.8"/>
    <circle cx="1020" cy="780" r="1.3"/>
  </g>

  <!-- 3. Sacred geometry — flower of life behind glyph -->
  <g transform="translate(540 720)" stroke="#d97757" fill="none" opacity="0.18" stroke-width="1.2">
    <circle r="160"/>
    <circle r="160" cx="160" cy="0"/>
    <circle r="160" cx="-160" cy="0"/>
    <circle r="160" cx="80"  cy="138.6"/>
    <circle r="160" cx="-80" cy="138.6"/>
    <circle r="160" cx="80"  cy="-138.6"/>
    <circle r="160" cx="-80" cy="-138.6"/>
  </g>

  <!-- 4. Outer ring -->
  <g transform="translate(540 720)" stroke="#d97757" fill="none" opacity="0.55" stroke-width="2">
    <circle r="280"/>
    <circle r="282" opacity="0.25" stroke-width="6" filter="url(#bloom)"/>
  </g>

  <!-- 5. Amber glow halo -->
  <ellipse cx="540" cy="720" rx="300" ry="300" fill="url(#emberGlow)" filter="url(#bigBloom)"/>

  <!-- 6. The glyph ⟁  (large, centered, glowing amber) -->
  <g transform="translate(540 720)">
    <!-- Drawn as nested triangles for crisp scaling. -->
    <polygon points="0,-130 130,90 -130,90"
             fill="none" stroke="#f7d96b" stroke-width="6"
             filter="url(#bloom)"/>
    <polygon points="0,-58 58,40 -58,40"
             fill="none" stroke="#f7d96b" stroke-width="4"
             filter="url(#bloom)"/>
    <polygon points="0,-130 130,90 -130,90"
             fill="#d97757" opacity="0.10"/>
  </g>

  <!-- 7. Top eyebrow (tracked-out Poppins all-caps) -->
  <text x="540" y="170"
        text-anchor="middle"
        font-family="'Poppins', 'Helvetica Neue', sans-serif"
        font-weight="600"
        font-size="22"
        letter-spacing="0.34em"
        fill="#d97757"
        opacity="0.92">A K A S H A · P A N T H E O N</text>

  <!-- 8. Main headline -->
  <text x="540" y="270"
        text-anchor="middle"
        font-family="'Poppins', 'Helvetica Neue', sans-serif"
        font-weight="700"
        font-size="64"
        letter-spacing="0.02em"
        fill="#faf9f5">THE END OF</text>
  <text x="540" y="345"
        text-anchor="middle"
        font-family="'Poppins', 'Helvetica Neue', sans-serif"
        font-weight="700"
        font-size="64"
        letter-spacing="0.02em"
        fill="#faf9f5">THE ONE-ANSWER AGE.</text>

  <!-- 9. Italic tagline (under glyph) -->
  <text x="540" y="1080"
        text-anchor="middle"
        font-family="'Lora', Georgia, serif"
        font-style="italic"
        font-size="38"
        fill="#f4dfd2"
        opacity="0.9">hold three truths at once.</text>

  <!-- 10. Three-tier benchmark line (the proof) -->
  <g font-family="'IBM Plex Mono', ui-monospace, monospace"
     font-size="18" fill="#f4dfd2" opacity="0.78"
     letter-spacing="0.1em" text-anchor="middle">
    <text x="540" y="1160">4B  ·  12 / 12        8B  ·  12 / 12        70B  ·  8 / 12</text>
    <text x="540" y="1186" font-size="13" opacity="0.55">N=36 · academic schema · MIT licensed · open source</text>
  </g>

  <!-- 11. Bottom URL bar -->
  <text x="540" y="1280"
        text-anchor="middle"
        font-family="'IBM Plex Mono', ui-monospace, monospace"
        font-size="20"
        letter-spacing="0.06em"
        fill="#d97757">github.com/spalsh-spec/akasha-pantheon</text>

  <!-- 12. Tiny credit -->
  <text x="540" y="1318"
        text-anchor="middle"
        font-family="'IBM Plex Mono', ui-monospace, monospace"
        font-size="11"
        letter-spacing="0.18em"
        fill="#97948a"
        opacity="0.6">SPARSH SHARMA · MELBOURNE · 2026</text>
</svg>
