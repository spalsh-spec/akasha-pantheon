<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- AKASHA · OG share card · 1200×630 · for Twitter/X, LinkedIn, Discord previews -->
  <defs>
    <radialGradient id="bg" cx="68%" cy="55%" r="80%">
      <stop offset="0%"   stop-color="#1c1133"/>
      <stop offset="100%" stop-color="#05030a"/>
    </radialGradient>
    <radialGradient id="ember" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#d97757" stop-opacity="0.85"/>
      <stop offset="40%"  stop-color="#d97757" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#d97757" stop-opacity="0"/>
    </radialGradient>
    <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigBloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glyph on the right side -->
  <ellipse cx="900" cy="315" rx="190" ry="190" fill="url(#ember)" filter="url(#bigBloom)"/>
  <g transform="translate(900 315)" stroke="#d97757" fill="none" opacity="0.45" stroke-width="1.5">
    <circle r="170"/>
  </g>
  <g transform="translate(900 315)">
    <polygon points="0,-95 95,68 -95,68" fill="none" stroke="#f7d96b" stroke-width="4" filter="url(#bloom)"/>
    <polygon points="0,-42 42,30 -42,30" fill="none" stroke="#f7d96b" stroke-width="3" filter="url(#bloom)"/>
    <polygon points="0,-95 95,68 -95,68" fill="#d97757" opacity="0.10"/>
  </g>

  <!-- Headlines on the left -->
  <text x="80" y="120"
        font-family="'Poppins', 'Helvetica Neue', sans-serif"
        font-weight="600" font-size="18"
        letter-spacing="0.34em" fill="#d97757">A K A S H A · P A N T H E O N</text>

  <text x="80" y="220"
        font-family="'Poppins', 'Helvetica Neue', sans-serif"
        font-weight="700" font-size="58"
        fill="#faf9f5">Hold three truths</text>
  <text x="80" y="290"
        font-family="'Poppins', 'Helvetica Neue', sans-serif"
        font-weight="700" font-size="58"
        fill="#faf9f5">at once.</text>

  <text x="80" y="370"
        font-family="'Lora', Georgia, serif" font-style="italic"
        font-size="22" fill="#f4dfd2" opacity="0.85">A structured-output prompting framework with a</text>
  <text x="80" y="402"
        font-family="'Lora', Georgia, serif" font-style="italic"
        font-size="22" fill="#f4dfd2" opacity="0.85">non-monotonic adherence finding across LLM scales.</text>

  <text x="80" y="480"
        font-family="'IBM Plex Mono', ui-monospace, monospace"
        font-size="16" letter-spacing="0.08em"
        fill="#d97757">4B · 12/12   ·   8B · 12/12   ·   70B · 8/12</text>

  <text x="80" y="560"
        font-family="'IBM Plex Mono', ui-monospace, monospace"
        font-size="16" letter-spacing="0.06em"
        fill="#faf9f5">github.com/spalsh-spec/akasha-pantheon</text>
  <text x="80" y="592"
        font-family="'IBM Plex Mono', ui-monospace, monospace"
        font-size="11" letter-spacing="0.18em"
        fill="#97948a" opacity="0.6">MIT · MAY 2026 · MELBOURNE</text>
</svg>
