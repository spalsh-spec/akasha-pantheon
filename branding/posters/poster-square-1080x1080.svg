<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <!-- AKASHA · IG GRID POSTER · 1080×1080 · brand mark -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="80%">
      <stop offset="0%"   stop-color="#1c1133"/>
      <stop offset="40%"  stop-color="#0e0820"/>
      <stop offset="100%" stop-color="#05030a"/>
    </radialGradient>
    <radialGradient id="emberGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#d97757" stop-opacity="0.85"/>
      <stop offset="40%"  stop-color="#d97757" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#d97757" stop-opacity="0"/>
    </radialGradient>
    <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigBloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="32" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>

  <g fill="#faf9f5" opacity="0.5">
    <circle cx="100" cy="180" r="1.2"/>
    <circle cx="320" cy="120" r="0.9"/>
    <circle cx="540" cy="80"  r="1.4"/>
    <circle cx="760" cy="140" r="1.1"/>
    <circle cx="980" cy="220" r="0.8"/>
    <circle cx="180" cy="900" r="1.0"/>
    <circle cx="420" cy="980" r="0.9"/>
    <circle cx="680" cy="940" r="1.3"/>
    <circle cx="900" cy="1000" r="0.7"/>
    <circle cx="80"  cy="540" r="1.0"/>
    <circle cx="1000" cy="560" r="0.9"/>
  </g>

  <g transform="translate(540 540)" stroke="#d97757" fill="none" opacity="0.16" stroke-width="1.2">
    <circle r="160"/>
    <circle r="160" cx="160" cy="0"/>
    <circle r="160" cx="-160" cy="0"/>
    <circle r="160" cx="80"  cy="138.6"/>
    <circle r="160" cx="-80" cy="138.6"/>
    <circle r="160" cx="80"  cy="-138.6"/>
    <circle r="160" cx="-80" cy="-138.6"/>
  </g>
  <g transform="translate(540 540)" stroke="#d97757" fill="none" opacity="0.5" stroke-width="2">
    <circle r="280"/>
  </g>
  <ellipse cx="540" cy="540" rx="300" ry="300" fill="url(#emberGlow)" filter="url(#bigBloom)"/>

  <g transform="translate(540 540)">
    <polygon points="0,-130 130,90 -130,90"
             fill="none" stroke="#f7d96b" stroke-width="6" filter="url(#bloom)"/>
    <polygon points="0,-58 58,40 -58,40"
             fill="none" stroke="#f7d96b" stroke-width="4" filter="url(#bloom)"/>
    <polygon points="0,-130 130,90 -130,90"
             fill="#d97757" opacity="0.10"/>
  </g>

  <text x="540" y="160"
        text-anchor="middle"
        font-family="'Poppins', 'Helvetica Neue', sans-serif"
        font-weight="600" font-size="22"
        letter-spacing="0.34em" fill="#d97757" opacity="0.92">A K A S H A · P A N T H E O N</text>

  <text x="540" y="900"
        text-anchor="middle"
        font-family="'Lora', Georgia, serif" font-style="italic"
        font-size="32" fill="#f4dfd2" opacity="0.9">hold three truths at once.</text>

  <text x="540" y="970"
        text-anchor="middle"
        font-family="'IBM Plex Mono', ui-monospace, monospace"
        font-size="14" fill="#f4dfd2" opacity="0.65"
        letter-spacing="0.12em">4B · 12/12        8B · 12/12        70B · 8/12</text>

  <text x="540" y="1030"
        text-anchor="middle"
        font-family="'IBM Plex Mono', ui-monospace, monospace"
        font-size="16" fill="#d97757" letter-spacing="0.06em">github.com/spalsh-spec/akasha-pantheon</text>
</svg>
