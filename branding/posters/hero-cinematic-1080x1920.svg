<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <!-- AKASHA · CINEMATIC HERO POSTER · 1080×1920 vertical
       Composite: Flux-generated silhouette+glyph image as background,
       typography overlaid in the brand spec.
       Render this with: rsvg-convert hero-cinematic-1080x1920.svg
  -->
  <defs>
    <!-- darken-from-edges vignette for legibility of overlay text -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="80%">
      <stop offset="0%"   stop-color="#000" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.7"/>
    </radialGradient>

    <!-- top fade for headline legibility -->
    <linearGradient id="topFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#000" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>

    <!-- bottom fade for URL legibility -->
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- 1. The cinematic still as background, fitted -->
  <image href="shot-C-silhouette-glyph.png" x="0" y="0" width="1080" height="1920" preserveAspectRatio="xMidYMid slice"/>

  <!-- 2. Edge vignette -->
  <rect width="1080" height="1920" fill="url(#vignette)"/>

  <!-- 3. Top fade for headline -->
  <rect width="1080" height="600" fill="url(#topFade)"/>

  <!-- 4. Bottom fade for footer -->
  <rect y="1500" width="1080" height="420" fill="url(#bottomFade)"/>

  <!-- 5. TOP: eyebrow brand mark -->
  <text x="540" y="160"
        text-anchor="middle"
        font-family="'Poppins', 'Helvetica Neue', sans-serif"
        font-weight="600" font-size="26"
        letter-spacing="0.34em" fill="#d97757">A K A S H A · P A N T H E O N</text>

  <!-- 6. Headline (slightly smaller; the image is doing the heavy lifting) -->
  <text x="540" y="290"
        text-anchor="middle"
        font-family="'Poppins', 'Helvetica Neue', sans-serif"
        font-weight="700" font-size="64"
        letter-spacing="0.02em" fill="#faf9f5">THE END OF</text>
  <text x="540" y="370"
        text-anchor="middle"
        font-family="'Poppins', 'Helvetica Neue', sans-serif"
        font-weight="700" font-size="64"
        letter-spacing="0.02em" fill="#faf9f5">THE ONE-ANSWER AGE.</text>

  <!-- 7. Italic tagline (underneath, between headline and image's glyph) -->
  <text x="540" y="450"
        text-anchor="middle"
        font-family="'Lora', Georgia, serif" font-style="italic"
        font-size="34" fill="#f4dfd2" opacity="0.92">hold three truths at once.</text>

  <!-- 8. BOTTOM: benchmark numbers -->
  <g font-family="'IBM Plex Mono', ui-monospace, monospace"
     fill="#f4dfd2" letter-spacing="0.1em" text-anchor="middle">
    <text x="540" y="1620" font-size="24" opacity="0.9">4B · 12/12     8B · 12/12     70B · 8/12</text>
    <text x="540" y="1660" font-size="14" opacity="0.6">N=36 · academic schema · MIT · open source</text>
  </g>

  <!-- 9. URL -->
  <text x="540" y="1780"
        text-anchor="middle"
        font-family="'IBM Plex Mono', ui-monospace, monospace"
        font-size="22" fill="#d97757" letter-spacing="0.06em">github.com/spalsh-spec/akasha-pantheon</text>

  <!-- 10. Tiny credit -->
  <text x="540" y="1850"
        text-anchor="middle"
        font-family="'IBM Plex Mono', ui-monospace, monospace"
        font-size="13" fill="#97948a" letter-spacing="0.18em" opacity="0.7">SPARSH SHARMA · MELBOURNE · 2026</text>
</svg>
